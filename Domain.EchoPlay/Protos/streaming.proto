syntax = "proto3";
service Streaming{
  //в обе стороны стрим для отправки и паралельного принятия информации
  rpc StreamVideo(stream MediaFrame) returns (stream MediaFrame);
}
message MediaFrame {
  bytes data = 1;        
  string format = 2;     // Формат контейнера (например, "mp4", "webm")
  int32 width = 3;       
  int32 height = 4;      
  int32 framerate = 5;   
  int32 bitrate = 6;
  string sender_id = 7;
}
