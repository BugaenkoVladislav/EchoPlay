syntax = "proto3";
service Streaming{
  //в обе стороны стрим для отправки и паралельного принятия информации
  rpc StreamVideo(stream MediaFrame) returns (stream MediaFrame);
}
message MediaFrame {
  VideoData video = 1;
  AudioData audio = 2;
  string sender_id = 3;
  int64 timestamp = 4;
}

message VideoData {
  bytes frame = 1;
  int32 width = 2;
  int32 height = 3;
}

message AudioData {
  bytes samples = 1;
  int32 sample_rate = 2;
  int32 channels = 3;
}